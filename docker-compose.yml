services:
  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:latest
    container_name: imgproxy
    restart: always
    ports:
      - 127.0.0.1:18889:18889
    volumes:
      - /var/lib/jellyfin/metadata:/media/metadata:ro
      - /var/lib/jellyfin/data/collections:/media/collections:ro
    environment:
      - IMGPROXY_BIND=0.0.0.0:18889
      - IMGPROXY_MAX_SRC_RESOLUTION=100 # Megapixel
      - IMGPROXY_MAX_RESULT_DIMENSION=3840
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/media
      - IMGPROXY_LOG_LEVEL=warn
      - IMGPROXY_CLIENT_KEEP_ALIVE_TIMEOUT=90
      - IMGPROXY_DOWNLOAD_TIMEOUT=10
      - IMGPROXY_REQUESTS_QUEUE_SIZE=500

      - IMGPROXY_AUTO_WEBP=true
      - IMGPROXY_ENFORCE_WEBP=true
      - IMGPROXY_WEBP_EFFORT=2
      - IMGPROXY_AUTO_AVIF=true
      - IMGPROXY_ENFORCE_AVIF=true
      - IMGPROXY_AUTO_JXL=true
      - IMGPROXY_ENFORCE_JXL=true
      - IMGPROXY_JXL_EFFORT=2
      - IMGPROXY_FORMAT_QUALITY=webp=85,avif=85,jxl=85

      - IMGPROXY_ALWAYS_RASTERIZE_SVG=true

      # - IMGPROXY_WORKERS=6
      # - GOMAXPROCS=6
